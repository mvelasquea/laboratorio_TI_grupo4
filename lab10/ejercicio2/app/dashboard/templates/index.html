<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RetailNova Group - Panel de Control</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header class="header">
        <h1>RetailNova Group</h1>
        <p>Panel de Control - Agentes IA para Cadena de Suministro</p>
    </header>

    <nav class="nav">
        <button onclick="mostrarPanel('panel-kpis')">KPIs</button>
        <button onclick="mostrarPanel('panel-inventarios')">Inventarios</button>
        <button onclick="mostrarPanel('panel-logistica')">Logística</button>
        <button onclick="mostrarPanel('panel-pronosticos')">Pronósticos</button>
        <button onclick="mostrarPanel('panel-alertas')">Alertas</button>
    </nav>

    <nav class="nav nav-agentes">
        <span class="nav-label">Agentes IA:</span>
        <button onclick="abrirChat('inventario')" class="btn-agente" data-agente="inventario">📦 Inventario</button>
        <button onclick="abrirChat('logistica')" class="btn-agente" data-agente="logistica">🚚 Logística</button>
        <button onclick="abrirChat('pronosticos')" class="btn-agente" data-agente="pronosticos">📈 Pronósticos</button>
        <button onclick="abrirChat('ejecutivo')" class="btn-agente" data-agente="ejecutivo">👔 Ejecutivo</button>
    </nav>

    <main class="main">
        <section id="panel-kpis" class="panel">
            <h2>KPIs Principales</h2>
            <div id="kpi-container" class="grid"></div>
        </section>

        <section id="panel-inventarios" class="panel oculto">
            <h2>Estado de Inventarios</h2>
            <div id="inventario-container"></div>
        </section>

        <section id="panel-logistica" class="panel oculto">
            <h2>Logística y Envíos</h2>
            <div id="logistica-container"></div>
        </section>

        <section id="panel-pronosticos" class="panel oculto">
            <h2>Pronósticos de Demanda</h2>
            <div id="pronostico-container"></div>
        </section>

        <section id="panel-alertas" class="panel oculto">
            <h2>Alertas Críticas</h2>
            <div id="alerta-container"></div>
        </section>

        <section id="panel-chat" class="panel oculto">
            <div class="chat-header">
                <h2 id="chat-titulo">Chat con Agente IA</h2>
                <button onclick="limpiarChat()" class="btn-limpiar">🗑️ Limpiar</button>
            </div>
            <div id="chat-mensajes" class="chat-mensajes"></div>
            <div class="chat-input">
                <input type="text" id="chat-input" placeholder="Escribe tu pregunta sobre RetailNova..." onkeypress="if(event.key==='Enter')enviarMensaje()">
                <button onclick="enviarMensaje()">Enviar</button>
            </div>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
